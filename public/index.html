<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrôle Garage</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .main-status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 10px #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .body { padding: 25px; }

        .battery-section {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .battery-info { display: flex; align-items: center; gap: 12px; }
        .battery-icon { font-size: 2rem; }

        .battery-text h3 {
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0.9;
            margin-bottom: 3px;
        }

        .battery-percent { font-size: 1.8rem; font-weight: 700; }

        .battery-bar {
            width: 100px;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .battery-fill {
            height: 100%;
            background: white;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .main-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .control-btn {
            border: none;
            padding: 25px 15px;
            border-radius: 20px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .control-btn:active { transform: scale(0.95); }

        .btn-open { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .btn-open:hover { box-shadow: 0 12px 25px rgba(16, 185, 129, 0.4); }
        .btn-close { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .btn-close:hover { box-shadow: 0 12px 25px rgba(239, 68, 68, 0.4); }
        .btn-icon { font-size: 2rem; }
        .btn-label { font-size: 0.75rem; opacity: 0.9; font-weight: 500; }

        .info-section {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .info-title {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .info-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .info-label { font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px; }
        .info-value { font-size: 1.3rem; font-weight: 700; color: #1e293b; }
        .info-unit { font-size: 0.85rem; font-weight: 500; color: #64748b; }

        .settings-section { margin-bottom: 20px; }

        .setting-item {
            background: white;
            padding: 18px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .setting-label { display: flex; align-items: center; gap: 12px; }
        .setting-icon { font-size: 1.3rem; }
        .setting-text h4 { font-size: 0.95rem; color: #1e293b; margin-bottom: 2px; }
        .setting-text p { font-size: 0.75rem; color: #94a3b8; }

        .toggle { position: relative; width: 54px; height: 28px; }
        .toggle input { opacity: 0; width: 0; height: 0; }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 34px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        .toggle input:checked + .toggle-slider { background-color: #10b981; }
        .toggle input:checked + .toggle-slider:before { transform: translateX(26px); }

        .slider-container { width: 100%; margin-top: 10px; }

        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 5px;
            background: #e2e8f0;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(59,130,246,0.4);
        }

        .slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(59,130,246,0.4);
        }

        .door-state-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .state-none { background: #dbeafe; color: #1e40af; }
        .state-unclosed { background: #fef3c7; color: #92400e; }
        .state-alarm { background: #fee2e2; color: #991b1b; }

        .loader {
            height: 3px;
            width: 100%;
            background: #e2e8f0;
            overflow: hidden;
            display: none;
            margin-top: 20px;
            border-radius: 2px;
        }

        .loader-bar {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            animation: loading 1s infinite ease-in-out;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }

        .console {
            background: #1e293b;
            color: #94a3b8;
            padding: 15px;
            border-radius: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            height: 80px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .console-time { color: #64748b; }
        .console-success { color: #4ade80; }
        .console-error { color: #f87171; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🏠 Contrôle Garage</h1>
        <div class="main-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="mainStatusText">Chargement...</span>
        </div>
    </div>

    <div class="body" id="mainBody">
        
        <div class="battery-section">
            <div class="battery-info">
                <div class="battery-icon">🔋</div>
                <div class="battery-text">
                    <h3>Batterie</h3>
                    <div class="battery-percent" id="batteryPercent">--</div>
                </div>
            </div>
            <div class="battery-bar">
                <div class="battery-fill" id="batteryFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="main-controls">
            <button class="control-btn btn-open" onclick="sendCommand('door_control_1', 'open')">
                <div class="btn-icon">⬆️</div>
                <div>OUVRIR</div>
                <div class="btn-label">Ouvre la porte</div>
            </button>
            <button class="control-btn btn-close" onclick="sendCommand('door_control_1', 'close')">
                <div class="btn-icon">⬇️</div>
                <div>FERMER</div>
                <div class="btn-label">Ferme la porte</div>
            </button>
        </div>

        <div class="info-section">
            <div class="info-title">📊 Informations</div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Temps d'ouverture</div>
                    <div>
                        <span class="info-value" id="doorTime">--</span>
                        <span class="info-unit">sec</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">Compteur</div>
                    <div>
                        <span class="info-value" id="countdown">--</span>
                        <span class="info-unit">sec</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">Alarme</div>
                    <div>
                        <span class="info-value" id="alarmCountdown">--</span>
                        <span class="info-unit">sec</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">État porte</div>
                    <div id="doorStateDisplay">
                        <span class="door-state-badge state-none">Normal</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="settings-section">
            <div class="setting-item">
                <div class="setting-label">
                    <div class="setting-icon">🎤</div>
                    <div class="setting-text">
                        <h4>Contrôle vocal</h4>
                        <p>Activer les commandes vocales</p>
                    </div>
                </div>
                <label class="toggle">
                    <input type="checkbox" id="voiceToggle" onchange="sendCommand('voice_control_1', this.checked)">
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <div class="setting-label">
                    <div class="setting-icon">⏱️</div>
                    <div class="setting-text">
                        <h4>Temps d'ouverture</h4>
                        <p>Durée : <span id="doorTimeValue">60</span> secondes</p>
                    </div>
                </div>
            </div>
            <div class="slider-container" style="padding: 0 18px 15px 18px;">
                <input type="range" min="10" max="120" value="60" class="slider" id="doorTimeSlider"
                       oninput="updateDoorTimeDisplay(this.value)"
                       onchange="sendCommand('door_time_1', parseInt(this.value))">
            </div>
        </div>

        <div class="loader" id="loader">
            <div class="loader-bar"></div>
        </div>

        <div class="console" id="console">
            <span class="console-time">[--:--:--]</span> Initialisation...
        </div>
    </div>
</div>

<script>
    // Sur Vercel, les routes API sont directement /api/status et /api/command
    const API_STATUS  = '/api/status';
    const API_COMMAND = '/api/command';

    let systemData = {};

    function log(message, type = 'info') {
        const now = new Date();
        const time = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        const consoleEl = document.getElementById('console');
        let className = '';
        if (type === 'success') className = 'console-success';
        if (type === 'error')   className = 'console-error';
        consoleEl.innerHTML = `<span class="console-time">[${time}]</span> <span class="${className}">${message}</span><br>` + consoleEl.innerHTML;
    }

    function pad(num) { return num.toString().padStart(2, '0'); }

    async function fetchStatus() {
        try {
            const response = await fetch(API_STATUS);
            const json = await response.json();
            if (json.result) {
                systemData = {};
                json.result.forEach(item => { systemData[item.code] = item.value; });
                updateUI();
            } else {
                log('Réponse inattendue: ' + JSON.stringify(json), 'error');
            }
        } catch (error) {
            log('Erreur connexion: ' + error.message, 'error');
        }
    }

    function updateUI() {
        const doorControl = systemData['door_control_1'];
        const statusText  = document.getElementById('mainStatusText');
        const statusDot   = document.getElementById('statusDot');

        if (doorControl === 'open') {
            statusText.textContent = 'OUVERT';
            statusDot.style.background = '#f87171';
            statusDot.style.boxShadow  = '0 0 10px #f87171';
        } else if (doorControl === 'close') {
            statusText.textContent = 'FERMÉ';
            statusDot.style.background = '#4ade80';
            statusDot.style.boxShadow  = '0 0 10px #4ade80';
        } else {
            statusText.textContent = 'INCONNU';
            statusDot.style.background = '#94a3b8';
            statusDot.style.boxShadow  = 'none';
        }

        const battery = systemData['battery_percentage'] || 0;
        document.getElementById('batteryPercent').textContent = battery + '%';
        document.getElementById('batteryFill').style.width = battery + '%';

        document.getElementById('doorTime').textContent      = systemData['door_time_1']      ?? '--';
        document.getElementById('countdown').textContent     = systemData['countdown_1']      ?? '--';
        document.getElementById('alarmCountdown').textContent = systemData['alarm_countdown_1'] ?? '--';

        const doorState   = systemData['door_state_1'];
        const stateDisplay = document.getElementById('doorStateDisplay');
        let stateHTML = '';
        switch (doorState) {
            case 'none':
                stateHTML = '<span class="door-state-badge state-none">Normal</span>'; break;
            case 'unclosed_time':
                stateHTML = '<span class="door-state-badge state-unclosed">Ouverte longtemps</span>'; break;
            case 'close_time_alarm':
                stateHTML = '<span class="door-state-badge state-alarm">⚠️ Alarme</span>'; break;
            default:
                stateHTML = '<span class="door-state-badge state-none">--</span>';
        }
        stateDisplay.innerHTML = stateHTML;

        document.getElementById('voiceToggle').checked = systemData['voice_control_1'] === true;

        const doorTimeValue = systemData['door_time_1'] || 60;
        document.getElementById('doorTimeSlider').value = doorTimeValue;
        document.getElementById('doorTimeValue').textContent = doorTimeValue;

        log('Interface mise à jour', 'success');
    }

    async function sendCommand(code, value) {
        const loader = document.getElementById('loader');
        loader.style.display = 'block';
        log(`Envoi: ${code} = ${value}`);

        try {
            const response = await fetch(API_COMMAND, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, value })
            });
            const result = await response.json();

            if (result.success) {
                log('✓ Commande envoyée', 'success');
                setTimeout(fetchStatus, 1500);
            } else {
                log('✗ Échec: ' + (result.message || result.error || 'Erreur inconnue'), 'error');
            }
        } catch (error) {
            log('✗ Erreur: ' + error.message, 'error');
        } finally {
            loader.style.display = 'none';
        }
    }

    function updateDoorTimeDisplay(value) {
        document.getElementById('doorTimeValue').textContent = value;
    }

    fetchStatus();
    setInterval(fetchStatus, 5000);
    log('Système initialisé', 'success');
</script>

</body>
</html>
